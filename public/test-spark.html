<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark SOG Test</title>
  <style>
    body { margin: 0; background: #0a0a0f; overflow: hidden; font-family: monospace; }
    #log { position: fixed; bottom: 0; left: 0; right: 0; max-height: 40vh; overflow-y: auto;
      background: rgba(0,0,0,0.85); color: #0f0; font-size: 12px; padding: 12px; z-index: 10; }
    .error { color: #f44; }
    .warn { color: #fa0; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas" style="width:100vw;height:100vh;display:block;"></canvas>
  <div id="log"></div>
  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

    const logEl = document.getElementById("log");
    function log(msg, cls = "") {
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    async function main() {
      log(">>> 开始测试 <<<");

      const canvas = document.getElementById("canvas");
      if (!canvas) { log("ERROR: 找不到 canvas", "error"); return; }
      log("canvas 已获取");

      let renderer;
      try {
        renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true });
      } catch (e) {
        log(`WebGLRenderer 创建失败: ${e.message}`, "error");
        return;
      }
      log("WebGLRenderer 创建成功");

      const gl = renderer.getContext();
      log(`WebGL 版本: ${gl.getParameter(gl.VERSION)}`);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);
      log("Scene 创建完成");

      const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
      camera.position.set(0, 1, 8);
      log("Camera 创建完成");

      let spark;
      try {
        spark = new SparkRenderer({ renderer });
        scene.add(spark);
        log("SparkRenderer 创建成功并添加到场景");
      } catch (e) {
        log(`SparkRenderer 创建失败: ${e.message}`, "error");
        return;
      }

      const url = "/assets/models/point_cloud_30000.sog";
      log(`开始加载: ${url}`);

      let splatMesh;
      try {
        splatMesh = new SplatMesh({
          url,
          onProgress: (e) => {
            if (e.lengthComputable && e.total > 0) {
              log(`下载进度: ${((e.loaded / e.total) * 100).toFixed(1)}% (${(e.loaded / 1024 / 1024).toFixed(1)}MB / ${(e.total / 1024 / 1024).toFixed(1)}MB)`);
            }
          },
          onLoad: (mesh) => {
            log(">>> onLoad 回调触发 <<<", "warn");
            const box = mesh.getBoundingBox();
            log(`Bounds center: ${box.getCenter(new THREE.Vector3()).toArray().map(v=>v.toFixed(4))}`);
            log(`Bounds size: ${box.getSize(new THREE.Vector3()).toArray().map(v=>v.toFixed(4))}`);
            log(`Bounds radius: ${box.getBoundingSphere(new THREE.Sphere()).radius.toFixed(4)}`);
          }
        });
        log("SplatMesh 构造函数执行完毕");
      } catch (e) {
        log(`SplatMesh 构造失败: ${e.message}`, "error");
        console.error(e);
        return;
      }

      scene.add(splatMesh);
      splatMesh.position.set(0, 0, 0);
      log("SplatMesh 已添加到场景，等待 initialized...");

      try {
        const initialized = await splatMesh.initialized;
        log(">>> initialized Promise resolved <<<", "warn");

        const box = initialized.getBoundingBox();
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const sphere = box.getBoundingSphere(new THREE.Sphere());

        log(`=== BOUNDS ===`);
        log(`Center: ${center.x.toFixed(4)}, ${center.y.toFixed(4)}, ${center.z.toFixed(4)}`);
        log(`Size: ${size.x.toFixed(4)}, ${size.y.toFixed(4)}, ${size.z.toFixed(4)}`);
        log(`Radius: ${sphere.radius.toFixed(4)}`);
        log(`Splat count: ${initialized.splats?.getNumSplats() ?? 'N/A'}`);

        const fovRad = (camera.fov * Math.PI) / 180;
        const fitHeight = sphere.radius / Math.tan(fovRad / 2);
        const distance = Math.max(sphere.radius * 3, fitHeight * 1.3);
        camera.position.set(
          center.x + distance * 0.5,
          center.y + distance * 0.4,
          center.z + distance * 0.8,
        );
        camera.lookAt(center);
        log(`相机定位完成, distance: ${distance.toFixed(2)}`);
      } catch (e) {
        log(`初始化失败: ${e.message}`, "error");
        console.error(e);
        return;
      }

      log("启动渲染循环...");
      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
      log(">>> 渲染循环已启动 <<<", "warn");

      const controls = new (await import("three/addons/controls/OrbitControls.js")).OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      log("OrbitControls 已附加");
    }

    main().catch(e => {
      log(`FATAL: ${e.message}`, "error");
      console.error(e);
    });
  </script>
</body>
</html>
