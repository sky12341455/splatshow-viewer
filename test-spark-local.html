<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Spark Local Test</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
    #log { position: fixed; bottom: 0; left: 0; right: 0; max-height: 50vh; overflow-y: auto;
      background: rgba(0,0,0,0.9); color: #0f0; font-size: 11px; padding: 10px; z-index: 100; line-height: 1.5; }
    .e { color: #f44; }
    .w { color: #fa0; }
    .i { color: #0af; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="log"></div>
  <script type="module">
    import * as THREE from '/node_modules/three/build/three.module.js';
    import { OrbitControls } from '/node_modules/three/examples/jsm/controls/OrbitControls.js';
    import { SparkRenderer, SplatMesh } from '/node_modules/@sparkjsdev/spark/dist/spark.module.js';

    const logEl = document.getElementById('log');
    function log(msg, cls = '') {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = `[${performance.now().toFixed(0)}ms] ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    log('=== SPARK SOG 本地测试 ===', 'i');

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    log(`WebGL: ${renderer.getContext().getParameter(renderer.getContext().VERSION)}`);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
    camera.position.set(0, 2, 10);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    log('Scene + Camera + Controls 就绪');

    const spark = new SparkRenderer({ renderer });
    scene.add(spark);
    log('SparkRenderer 已添加', 'i');

    const url = '/assets/models/point_cloud_30000.sog';
    log(`开始创建 SplatMesh: ${url}`);

    const splat = new SplatMesh({
      url,
      onProgress: (e) => {
        if (e.lengthComputable && e.total > 0) {
          log(`下载: ${((e.loaded/e.total)*100).toFixed(0)}% (${(e.loaded/1024/1024).toFixed(1)}/${(e.total/1024/1024).toFixed(1)}MB)`);
        }
      },
      onLoad: () => log('onLoad 回调触发', 'w'),
    });

    scene.add(splat);
    splat.position.set(0, 0, 0);
    log('SplatMesh 已添加，等待 initialized Promise...');

    renderer.setAnimationLoop(() => { renderer.render(scene, camera); controls.update(); });

    try {
      const mesh = await splat.initialized;
      log('initialized Promise resolved!', 'w');

      const box = mesh.getBoundingBox();
      const c = box.getCenter(new THREE.Vector3());
      const s = box.getSize(new THREE.Vector3());
      const r = box.getBoundingSphere(new THREE.Sphere()).radius;

      log(`Center: (${c.x.toFixed(3)}, ${c.y.toFixed(3)}, ${c.z.toFixed(3)})`);
      log(`Size:   (${s.x.toFixed(3)}, ${s.y.toFixed(3)}, ${s.z.toFixed(3)})`);
      log(`Radius: ${r.toFixed(3)}`);

      const count = mesh.splats?.getNumSplats() ?? 0;
      log(`Splat count: ${count}`, 'w');

      const d = Math.max(r * 3, r / Math.tan(camera.fov * Math.PI / 360) * 1.3);
      camera.position.set(c.x + d * 0.5, c.y + d * 0.4, c.z + d * 0.8);
      controls.target.copy(c);
      log(`相机: distance=${d.toFixed(1)}, 模型应已可见`, 'w');
    } catch (e) {
      log(`FAIL: ${e.message || e}`, 'e');
      console.error(e);
    }
  </script>
</body>
</html>
